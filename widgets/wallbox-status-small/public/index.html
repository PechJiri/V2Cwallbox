<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2C Wallbox Small</title>
    <style>
        :root {
            --v2c-navy-deep: #001a3d;
            --v2c-navy: #00275b;
            --v2c-cyan: #00C2FF;
            --v2c-energy: #00E38F;
            --v2c-warm: #FFB020;
            --v2c-mist: #8A94A7;
            --v2c-ivory: #F5F7FA;
            --v2c-line: rgba(255, 255, 255, 0.08);
            --accent: var(--v2c-mist);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: var(--homey-font-family), -apple-system, system-ui, sans-serif;
            color: var(--v2c-ivory);
        }

        #container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 6px 14px 6px 6px;
            box-sizing: border-box;
            background: linear-gradient(135deg, var(--v2c-navy-deep) 0%, var(--v2c-navy) 100%);
            border-radius: var(--homey-border-radius-default, 10px);
            overflow: hidden;
            transition: background 0.6s ease;
        }

        #container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--v2c-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--v2c-line) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        #container::after {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 55%;
            height: 220%;
            background: radial-gradient(circle at center, var(--accent) 0%, transparent 60%);
            opacity: 0.15;
            filter: blur(14px);
            transition: opacity 0.6s ease, background 0.6s ease;
            pointer-events: none;
        }

        #container.state-charging::after { opacity: 0.38; }
        #container.state-paused::after   { opacity: 0.22; }
        #container.state-out::after      { opacity: 0.06; }

        /* ---------- GAUGE ---------- */
        .gauge-wrap {
            position: relative;
            width: 104px;
            height: 104px;
            flex-shrink: 0;
            z-index: 1;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .gauge-track {
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 7;
            fill: none;
            stroke-linecap: round;
        }

        .gauge-progress {
            stroke: var(--accent);
            stroke-width: 7;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 0 283;
            transition: stroke-dasharray 0.9s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.5s ease, filter 0.4s ease;
        }

        #container.state-charging .gauge-progress {
            filter: drop-shadow(0 0 6px var(--v2c-energy)) drop-shadow(0 0 12px rgba(0, 227, 143, 0.4));
        }

        /* Rotating accent ring when charging - sweeping comet */
        .gauge-comet {
            stroke: var(--v2c-energy);
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 14 269;
            opacity: 0;
            transform-origin: 60px 60px;
            transition: opacity 0.4s ease;
        }

        #container.state-charging .gauge-comet {
            opacity: 0.8;
            animation: rotate 3.5s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(135deg); }
            to   { transform: rotate(495deg); }
        }

        /* Tick marks - subtle indicators around the gauge */
        .gauge-tick {
            stroke: rgba(255, 255, 255, 0.18);
            stroke-width: 1.2;
            stroke-linecap: round;
            transition: stroke 0.4s ease;
        }

        #container.state-charging .gauge-tick { stroke: rgba(0, 227, 143, 0.3); }

        .gauge-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .gauge-value {
            font-family: 'SF Mono', Menlo, Consolas, 'Roboto Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            color: var(--v2c-ivory);
            letter-spacing: -0.03em;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        #container.state-charging .gauge-value {
            color: var(--v2c-energy);
            text-shadow: 0 0 10px rgba(0, 227, 143, 0.4);
        }

        .gauge-unit {
            font-size: 9px;
            color: var(--v2c-mist);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-top: 1px;
            font-weight: 600;
        }

        /* ---------- INFO ---------- */
        .info {
            flex: 1;
            min-width: 0;
            padding-left: 10px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .state-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .state-dot {
            position: relative;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            transition: background 0.4s ease;
        }

        .state-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: background 0.4s ease;
        }

        #container.state-charging .state-dot::after {
            opacity: 0.55;
            animation: pulse 1.8s ease-out infinite;
        }

        @keyframes pulse {
            0%   { transform: scale(0.8); opacity: 0.55; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .state-text {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--v2c-ivory);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .session-label {
            font-size: 9px;
            color: var(--v2c-mist);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: 600;
        }

        .session-value {
            font-family: 'SF Mono', Menlo, Consolas, 'Roboto Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--v2c-ivory);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .session-value .u {
            font-size: 10px;
            color: var(--v2c-mist);
            font-weight: 600;
            margin-left: 2px;
            letter-spacing: 0.05em;
        }

        .brand-mark {
            position: absolute;
            bottom: 6px;
            right: 10px;
            font-family: 'SF Mono', Menlo, Consolas, 'Roboto Mono', monospace;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.22em;
            color: var(--v2c-mist);
            opacity: 0.45;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="container" class="state-out">
        <div class="gauge-wrap">
            <svg class="gauge-svg" viewBox="0 0 120 120">
                <g transform="rotate(135 60 60)">
                    <circle class="gauge-track" cx="60" cy="60" r="45"
                            stroke-dasharray="212.25 283"/>
                    <!-- Tick marks at 0%, 25%, 50%, 75%, 100% of arc -->
                    <g>
                        <line class="gauge-tick" x1="60" y1="9"  x2="60" y2="14"  transform="rotate(0   60 60)"/>
                        <line class="gauge-tick" x1="60" y1="9"  x2="60" y2="14"  transform="rotate(68  60 60)"/>
                        <line class="gauge-tick" x1="60" y1="9"  x2="60" y2="14"  transform="rotate(135 60 60)"/>
                        <line class="gauge-tick" x1="60" y1="9"  x2="60" y2="14"  transform="rotate(203 60 60)"/>
                        <line class="gauge-tick" x1="60" y1="9"  x2="60" y2="14"  transform="rotate(270 60 60)"/>
                    </g>
                    <circle class="gauge-progress" id="gaugeProgress" cx="60" cy="60" r="45"/>
                    <circle class="gauge-comet" id="gaugeComet" cx="60" cy="60" r="45"/>
                </g>
            </svg>
            <div class="gauge-center">
                <div class="gauge-value" id="kwValue">0.0</div>
                <div class="gauge-unit">kW</div>
            </div>
        </div>
        <div class="info">
            <div class="state-row">
                <span class="state-dot"></span>
                <span id="stateText" class="state-text">Loading</span>
            </div>
            <div class="session">
                <div class="session-label">Session</div>
                <div class="session-value"><span id="kwhValue">0.0</span><span class="u">kWh</span></div>
            </div>
        </div>
        <div class="brand-mark">V2C</div>
    </div>
    <script type="text/javascript">
        let Homey;
        let isUpdating = false;
        const updateInterval = 5000;

        // Nominal max power for the gauge (full ring = this value).
        // Default 22 kW = typical 3-phase Trydan maximum (32 A × 230 V × 3).
        const MAX_KW_FALLBACK = 22;

        // Arc length of the 270° progress track (2π·45·0.75)
        const ARC_LENGTH = 212.25;
        const FULL_DASH = 283;

        const STATE_TEXT = {
            plugged_out: 'Unplugged',
            plugged_in: 'Plugged in',
            plugged_in_charging: 'Charging',
            plugged_in_paused: 'Paused',
            plugged_in_discharging: 'Discharging'
        };

        const STATE_CLASS = {
            plugged_out: 'state-out',
            plugged_in: 'state-plugged',
            plugged_in_charging: 'state-charging',
            plugged_in_paused: 'state-paused',
            plugged_in_discharging: 'state-charging'
        };

        const STATE_ACCENT = {
            plugged_out: '#8A94A7',
            plugged_in: '#00C2FF',
            plugged_in_charging: '#00E38F',
            plugged_in_paused: '#FFB020',
            plugged_in_discharging: '#00E38F'
        };

        function onHomeyReady(_Homey) {
            Homey = _Homey;
            init();
            Homey.ready();
        }

        function applyState(state) {
            const container = document.getElementById('container');
            container.classList.remove('state-out', 'state-plugged', 'state-charging', 'state-paused');
            container.classList.add(STATE_CLASS[state] || 'state-out');
            container.style.setProperty('--accent', STATE_ACCENT[state] || '#8A94A7');
            document.getElementById('stateText').textContent = STATE_TEXT[state] || '—';
        }

        function setGauge(kw) {
            const ratio = Math.min(Math.max(kw / MAX_KW_FALLBACK, 0), 1);
            const filled = ratio * ARC_LENGTH;
            const empty = FULL_DASH - filled;
            document.getElementById('gaugeProgress')
                .setAttribute('stroke-dasharray', `${filled} ${empty}`);
        }

        function updateUI(status) {
            const state = status.evChargingState || 'plugged_out';
            applyState(state);

            const kw = (status.chargePower || 0) / 1000;
            const kwh = status.sessionEnergy || 0;

            document.getElementById('kwValue').textContent = kw.toFixed(1);
            document.getElementById('kwhValue').textContent = kwh.toFixed(1);

            // Gauge reflects live power while charging / discharging; idle = empty
            const chargingLike = state === 'plugged_in_charging' || state === 'plugged_in_discharging';
            setGauge(chargingLike ? kw : 0);
        }

        function updateData() {
            if (isUpdating) return;
            isUpdating = true;
            Homey.api('GET', '/status')
                .then(updateUI)
                .catch((err) => console.error('Widget fetch error:', err))
                .finally(() => { isUpdating = false; });
        }

        function init() {
            updateData();
            setInterval(updateData, updateInterval);
        }

        if (window.Homey) {
            onHomeyReady(window.Homey);
        } else {
            document.addEventListener('homey_ready', function () {
                onHomeyReady(window.Homey);
            });
        }
    </script>
</body>
</html>
