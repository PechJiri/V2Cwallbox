<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2C Wallbox Status</title>
    <style>
        :root {
            --v2c-navy-deep: #001a3d;
            --v2c-navy: #00275b;
            --v2c-navy-soft: #0a3a7a;
            --v2c-cyan: #00C2FF;
            --v2c-energy: #00E38F;
            --v2c-warm: #FFB020;
            --v2c-mist: #8A94A7;
            --v2c-ivory: #F5F7FA;
            --v2c-line: rgba(255, 255, 255, 0.08);
            --accent: var(--v2c-mist);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: var(--homey-font-family), -apple-system, system-ui, sans-serif;
            color: var(--v2c-ivory);
        }

        #container {
            position: relative;
            display: flex;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--v2c-navy-deep) 0%, var(--v2c-navy) 100%);
            border-radius: var(--homey-border-radius-default, 10px);
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* Subtle grid texture */
        #container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--v2c-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--v2c-line) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.35;
            pointer-events: none;
        }

        /* Accent corner glow (animated based on state) */
        #container::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -30%;
            width: 70%;
            height: 180%;
            background: radial-gradient(circle at center, var(--accent) 0%, transparent 60%);
            opacity: 0.18;
            filter: blur(20px);
            transition: opacity 0.6s ease, background 0.6s ease;
            pointer-events: none;
        }

        #container.state-charging::after { opacity: 0.35; }
        #container.state-paused::after   { opacity: 0.25; }
        #container.state-out::after      { opacity: 0.08; }

        #imageContainer {
            flex: 0 0 42%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        #deviceImage {
            max-width: 82%;
            max-height: 82%;
            object-fit: contain;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.35));
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        #container.state-charging #deviceImage {
            filter: drop-shadow(0 0 14px var(--v2c-energy)) drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4));
        }

        #infoContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 12px 16px 12px 4px;
            position: relative;
            z-index: 1;
            min-width: 0;
        }

        .state-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .state-dot {
            position: relative;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            transition: background 0.4s ease;
        }

        .state-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.4s ease, background 0.4s ease;
        }

        #container.state-charging .state-dot::after {
            opacity: 0.6;
            animation: pulse 1.8s ease-out infinite;
        }

        @keyframes pulse {
            0%   { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(2.6); opacity: 0; }
        }

        .state-text {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--v2c-ivory);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metrics {
            display: flex;
            gap: 14px;
            margin-bottom: 10px;
        }

        .metric {
            flex: 1;
            min-width: 0;
        }

        .metric-value {
            font-family: 'SF Mono', Menlo, Consolas, 'Roboto Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.05;
            color: var(--v2c-ivory);
            letter-spacing: -0.02em;
        }

        #container.state-charging .metric-value {
            color: var(--v2c-energy);
            text-shadow: 0 0 10px rgba(0, 227, 143, 0.35);
        }

        .metric-unit {
            font-size: 10px;
            color: var(--v2c-mist);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }

        .control-button {
            display: none;
            background: transparent;
            color: var(--v2c-ivory);
            border: 1px solid var(--accent);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease, border-color 0.4s ease;
            align-self: flex-start;
        }

        .control-button.visible { display: inline-flex; align-items: center; gap: 6px; }
        .control-button:hover:not(:disabled) {
            background: var(--accent);
            color: var(--v2c-navy-deep);
        }
        .control-button:disabled { opacity: 0.5; cursor: wait; }

        .control-button::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 1px;
            background: var(--accent);
            transition: background 0.25s ease;
        }
        .control-button:hover:not(:disabled)::before { background: var(--v2c-navy-deep); }
        #container.state-paused .control-button::before {
            width: 0;
            height: 0;
            border-radius: 0;
            background: transparent;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid var(--accent);
        }
        #container.state-paused .control-button:hover:not(:disabled)::before {
            border-left-color: var(--v2c-navy-deep);
        }
    </style>
</head>
<body>
    <div id="container" class="state-out">
        <div id="imageContainer">
            <img id="deviceImage" src="large.png" alt="V2C Wallbox">
        </div>
        <div id="infoContainer">
            <div class="state-row">
                <span class="state-dot"></span>
                <span id="wallboxState" class="state-text">Loading</span>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value"><span id="powerKW">0.0</span></div>
                    <div class="metric-unit">kW</div>
                </div>
                <div class="metric">
                    <div class="metric-value"><span id="powerKWh">0.0</span></div>
                    <div class="metric-unit">kWh session</div>
                </div>
            </div>
            <button id="controlButton" class="control-button">Pause</button>
        </div>
    </div>
    <script type="text/javascript">
        let Homey;
        let isUpdating = false;
        let updateInterval = 5000;

        const STATE_TEXT = {
            plugged_out: 'Unplugged',
            plugged_in: 'Plugged in',
            plugged_in_charging: 'Charging',
            plugged_in_paused: 'Paused',
            plugged_in_discharging: 'Discharging'
        };

        const STATE_CLASS = {
            plugged_out: 'state-out',
            plugged_in: 'state-plugged',
            plugged_in_charging: 'state-charging',
            plugged_in_paused: 'state-paused',
            plugged_in_discharging: 'state-charging'
        };

        const STATE_ACCENT = {
            plugged_out: '#8A94A7',
            plugged_in: '#00C2FF',
            plugged_in_charging: '#00E38F',
            plugged_in_paused: '#FFB020',
            plugged_in_discharging: '#00E38F'
        };

        function onHomeyReady(_Homey) {
            Homey = _Homey;
            init();
            Homey.ready();
        }

        function resolveState(status) {
            if (status.evChargingState && STATE_TEXT[status.evChargingState]) {
                return status.evChargingState;
            }
            // Fallback pro starou API (measure_charge_state + paused)
            if (status.paused) return 'plugged_in_paused';
            if (status.chargeState === '0') return 'plugged_out';
            if (status.chargeState === '2') return 'plugged_in_charging';
            return 'plugged_in';
        }

        function applyState(state) {
            const container = document.getElementById('container');
            container.classList.remove('state-out', 'state-plugged', 'state-charging', 'state-paused');
            container.classList.add(STATE_CLASS[state] || 'state-out');
            container.style.setProperty('--accent', STATE_ACCENT[state] || '#8A94A7');
            document.getElementById('wallboxState').textContent = STATE_TEXT[state] || '—';

            const button = document.getElementById('controlButton');
            if (state === 'plugged_out') {
                button.classList.remove('visible');
            } else {
                button.classList.add('visible');
                button.textContent = state === 'plugged_in_paused' ? 'Resume' : 'Pause';
            }
        }

        function updateUI(status) {
            const state = resolveState(status);
            applyState(state);
            document.getElementById('powerKW').textContent = ((status.chargePower || 0) / 1000).toFixed(1);
            document.getElementById('powerKWh').textContent = (status.chargeEnergy || 0).toFixed(1);
        }

        function updateData() {
            if (isUpdating) return;
            isUpdating = true;
            Homey.api('GET', '/status')
                .then(updateUI)
                .catch((err) => console.error('Widget fetch error:', err))
                .finally(() => { isUpdating = false; });
        }

        function setupControlButton() {
            const button = document.getElementById('controlButton');
            button.addEventListener('click', async () => {
                try {
                    button.disabled = true;
                    const result = await Homey.api('GET', '/status');
                    const setPausedResult = await Homey.api('POST', '/paused', { paused: !result.paused });
                    if (!setPausedResult.success) throw new Error('Failed to set paused state');
                    await new Promise((r) => setTimeout(r, 400));
                    updateData();
                } catch (err) {
                    console.error('Error toggling pause:', err);
                } finally {
                    button.disabled = false;
                }
            });
        }

        function loadUpdateInterval() {
            const settings = Homey.getSettings();
            if (settings && settings.update_interval) {
                updateInterval = parseInt(settings.update_interval, 10) * 1000;
            }
        }

        function init() {
            setupControlButton();
            loadUpdateInterval();
            updateData();
            setInterval(updateData, updateInterval);
        }

        if (window.Homey) {
            onHomeyReady(window.Homey);
        } else {
            document.addEventListener('homey_ready', function () {
                onHomeyReady(window.Homey);
            });
        }
    </script>
</body>
</html>
